# Ultralytics dataset config for the ATLAS traffic-light dataset (YOLO format).
#
# ATLAS is organized as <split>/<camera>/images|labels (split = train|test,
# camera = front_medium|front_tele|front_wide). Ultralytics globs images
# recursively under each split dir and derives labels by swapping the
# `/images/` path segment for `/labels/`, so pointing train/val at the split
# dirs "just works" across all three cameras.
#
# ATLAS ships only train + test (both labelled); we use test as the validation
# split here. The course's real 425-image submission test set is separate.

path: /home/yannic/code/tld-traffic-light-detection/dataset/ATLAS   # dataset root (edit to your local ATLAS path)
train: train                       # 30216 imgs across 3 cameras
val: test                          # 2828 imgs (used for validation)

nc: 25
names:
  0: circle_green
  1: circle_red
  2: off
  3: circle_red_yellow
  4: arrow_left_green
  5: circle_yellow
  6: arrow_right_red
  7: arrow_left_red
  8: arrow_straight_red
  9: arrow_left_red_yellow
  10: arrow_left_yellow
  11: arrow_straight_yellow
  12: arrow_right_red_yellow
  13: arrow_right_green
  14: arrow_right_yellow
  15: arrow_straight_green
  16: arrow_straight_left_green
  17: arrow_straight_red_yellow
  18: arrow_straight_left_red
  19: arrow_straight_left_yellow
  20: arrow_straight_left_red_yellow
  21: arrow_straight_right_red
  22: arrow_straight_right_red_yellow
  23: arrow_straight_right_yellow
  24: arrow_straight_right_green
